<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Azrael's D&D Character Sheet</title>
  <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
  <style>
    body {
      background: #0a0a0a;
      color: #fff;
      font-family: 'VT323', monospace;
      margin: 0;
      padding: 2rem;
      max-width: 1200px;
      margin: auto;
    }
    .neon {
      color: #0ff;
      text-shadow: 0 0 5px #0ff, 0 0 10px #0ff, 0 0 20px #0ff;
    }
    h1 { font-size: 36px; text-align: center; margin-bottom: 2rem; }
    .section {
      background: rgba(0, 255, 255, 0.1);
      border: 2px solid #0ff;
      padding: 1.5rem;
      margin: 1rem 0;
      border-radius: 5px;
    }
    .row {
      display: flex;
      margin: 1rem 0;
      align-items: center;
    }
    label {
      width: 120px;
      font-size: 20px;
      text-align: right;
      margin-right: 1rem;
    }
    input, select {
      background: #001100;
      border: 1px solid #0ff;
      color: #0ff;
      font-family: 'VT323', monospace;
      font-size: 20px;
      padding: 0.5rem;
      flex: 1;
      max-width: 200px;
    }
    .stat {
      text-align: center;
      font-size: 28px;
      font-weight: bold;
      margin: 0 0.5rem;
      padding: 0.5rem;
      background: rgba(0, 255, 255, 0.2);
      border: 1px solid #0ff;
      border-radius: 5px;
    }
    .mod {
      color: #ff0;
      font-size: 24px;
    }
    button {
      background: #0ff;
      border: none;
      color: #000;
      font-family: 'VT323', monospace;
      font-size: 20px;
      padding: 0.8rem 1.5rem;
      cursor: pointer;
      box-shadow: 0 0 10px #0ff;
      transition: all 0.3s;
      margin: 0.5rem;
    }
    button:hover {
      box-shadow: 0 0 20px #0ff;
      transform: scale(1.05);
    }
    #hp-bar {
      width: 200px;
      height: 20px;
      background: #001100;
      border: 2px solid #0ff;
      margin: 0.5rem auto;
    }
    #hp-fill {
      height: 100%;
      background: linear-gradient(90deg, #f00, #ff0, #0f0);
      width: 100%;
      transition: width 0.3s;
    }
    #ac-mod { font-size: 32px; color: #ff0; }
  </style>
</head>
<body>
  <h1 class="neon">Azrael's D&D Character Sheet</h1>

  <div class="section">
    <div class="row">
      <label>Name:</label>
      <input type="text" id="name" placeholder="Enter character name">
    </div>
    <div class="row">
      <label>Race:</label>
      <select id="race">
        <option>Human</option>
        <option>Elf</option>
        <option>Dwarf</option>
        <option>Halfling</option>
        <option>Orc</option>
        <option>Tiefling</option>
        <option>Dragonborn</option>
      </select>
      <label>Class:</label>
      <select id="class">
        <option>Fighter</option>
        <option>Wizard</option>
        <option>Rogue</option>
        <option>Bard</option>
        <option>Cleric</option>
        <option>Paladin</option>
        <option>Ranger</option>
      </select>
      <label>Level:</label>
      <input type="number" id="level" value="1" min="1" max="20">
    </div>
  </div>

  <div class="section">
    <h2 class="neon">Ability Scores</h2>
    <div class="row">
      <div class="stat" data-stat="str">
        STR: <input type="number" id="str" value="10" min="1" max="20">
        <span class="mod" id="str-mod"></span>
      </div>
      <div class="stat" data-stat="dex">
        DEX: <input type="number" id="dex" value="10" min="1" max="20">
        <span class="mod" id="dex-mod"></span>
      </div>
      <div class="stat" data-stat="con">
        CON: <input type="number" id="con" value="10" min="1" max="20">
        <span class="mod" id="con-mod"></span>
      </div>
    </div>
    <div class="row">
      <div class="stat" data-stat="int">
        INT: <input type="number" id="int" value="10" min="1" max="20">
        <span class="mod" id="int-mod"></span>
      </div>
      <div class="stat" data-stat="wis">
        WIS: <input type="number" id="wis" value="10" min="1" max="20">
        <span class="mod" id="wis-mod"></span>
      </div>
      <div class="stat" data-stat="cha">
        CHA: <input type="number" id="cha" value="10" min="1" max="20">
        <span class="mod" id="cha-mod"></span>
      </div>
    </div>
  </div>

  <div class="section">
    <h2 class="neon">Vitals</h2>
    <div class="row">
      <label>Max HP:</label>
      <input type="number" id="max-hp" value="10">
      <label>Current HP:</label>
      <input type="number" id="current-hp" value="10" min="0">
      <div id="hp-bar">
        <div id="hp-fill"></div>
      </div>
    </div>
    <div class="row">
      <label>AC:</label>
      <input type="number" id="ac" value="10">
      <span id="ac-mod" class="neon">10</span>
    </div>
  </div>

  <div class="section">
    <h2 class="neon">Actions</h2>
    <button onclick="saveSheet()">SAVE SHEET</button>
    <button onclick="loadSheet()">LOAD SHEET</button>
    <button onclick="resetSheet()">RESET</button>
  </div>

  <script>
    const stats = ['str', 'dex', 'con', 'int', 'wis', 'cha'];

    function calculateMod(stat) {
      const value = parseInt(document.getElementById(stat).value) || 10;
      return Math.floor((value - 10) / 2);
    }

    function updateMods() {
      stats.forEach(stat => {
        const modEl = document.getElementById(stat + '-mod');
        const mod = calculateMod(stat);
        modEl.textContent = mod >= 0 ? `+${mod}` : mod;
        modEl.className = mod >= 0 ? 'mod positive' : 'mod negative';
      });

      // Update AC mod (DEX mod example)
      const dexMod = calculateMod('dex');
      document.getElementById('ac-mod').textContent = document.getElementById('ac').value + dexMod;
    }

    function updateHPBar() {
      const maxHP = parseInt(document.getElementById('max-hp').value) || 10;
      const currentHP = parseInt(document.getElementById('current-hp').value) || 10;
      const percent = (currentHP / maxHP) * 100;
      document.getElementById('hp-fill').style.width = percent + '%';
    }

    // Event listeners
    stats.forEach(stat => {
      document.getElementById(stat).addEventListener('input', updateMods);
    });
    ['max-hp', 'current-hp'].forEach(id => {
      document.getElementById(id).addEventListener('input', updateHPBar);
    });
    document.getElementById('ac').addEventListener('input', updateMods);

    function saveSheet() {
      const sheet = {
        name: document.getElementById('name').value,
        race: document.getElementById('race').value,
        class: document.getElementById('class').value,
        level: document.getElementById('level').value,
        stats: stats.reduce((obj, stat) => {
          obj[stat] = document.getElementById(stat).value;
          return obj;
        }, {}),
        maxHP: document.getElementById('max-hp').value,
        currentHP: document.getElementById('current-hp').value,
        ac: document.getElementById('ac').value
      };
      localStorage.setItem('dnd-sheet', JSON.stringify(sheet));
      alert('Sheet saved!');
    }

    function loadSheet() {
      const saved = localStorage.getItem('dnd-sheet');
      if (saved) {
        const sheet = JSON.parse(saved);
        document.getElementById('name').value = sheet.name || '';
        document.getElementById('race').value = sheet.race || '';
        document.getElementById('class').value = sheet.class || '';
        document.getElementById('level').value = sheet.level || 1;
        Object.keys(sheet.stats).forEach(stat => {
          document.getElementById(stat).value = sheet.stats[stat] || 10;
        });
        document.getElementById('max-hp').value = sheet.maxHP || 10;
        document.getElementById('current-hp').value = sheet.currentHP || 10;
        document.getElementById('ac').value = sheet.ac || 10;
        updateMods();
        updateHPBar();
        alert('Sheet loaded!');
      } else {
        alert('No saved sheet found!');
      }
    }

    function resetSheet() {
      if (confirm('Reset sheet?')) {
        document.querySelectorAll('input, select').forEach(el => {
          if (el.id === 'level') el.value = 1;
          else if (el.type === 'number') el.value = el.id.includes('hp') ? 10 : 10;
          else el.value = '';
        });
        updateMods();
        updateHPBar();
      }
    }

    // Initial update
    updateMods();
    updateHPBar();
  </script>
</body>
</html>
