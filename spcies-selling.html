<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="spices.css" />
    <title>Spice Distribution Co.</title>
</head>
<body>
    <header>
        <div> 
            <h1>R.D.P Spices</h1>

            <svg width="480" height="320" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="R.D.P crown logo" preserveAspectRatio="xMidYMid meet">
              <defs>
                <linearGradient id="goldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                  <stop offset="0%" stop-color="#ffe07a"/>
                  <stop offset="60%" stop-color="#ffd14a"/>
                  <stop offset="100%" stop-color="#d4af37"/>
                </linearGradient>

                <linearGradient id="bandHighlight" x1="0" y1="0" x2="0" y2="1">
                  <stop offset="0" stop-color="#ffffff" stop-opacity="0.6"/>
                  <stop offset="1" stop-color="#ffffff" stop-opacity="0.03"/>
                </linearGradient>

                <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
                  <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000" flood-opacity="0.12"/>
                </filter>
              </defs>

              <!-- shadow under crown -->
              <ellipse cx="200" cy="260" rx="118" ry="18" fill="rgba(0,0,0,0.08)"/>

              <g filter="url(#softShadow)">
                <!-- band -->
                <path d="M60 200 C90 240 310 240 340 200 L340 230 C320 250 80 250 60 230 Z"
                      fill="url(#goldGrad)" stroke="#8b5a17" stroke-width="6" stroke-linejoin="round"/>

                <!-- peaks (smooth rounded/emoji style) -->
                <path d="M70 200
                         Q110 95 150 200
                         Q190 55 210 200
                         Q250 95 290 200
                         L340 200 L60 200 Z"
                      fill="url(#goldGrad)" stroke="#8b5a17" stroke-width="6" stroke-linejoin="round"/>

                <!-- band highlight -->
                <path d="M84 212 C130 232 270 232 316 212" fill="none" stroke="url(#bandHighlight)" stroke-width="16" stroke-linecap="round" opacity="0.6"/>
              </g>

              <!-- circular tips (emoji-like) -->
              <g transform="translate(0,-22)">
                <circle cx="150" cy="110" r="16" fill="#ffd86b" stroke="#8b5a17" stroke-width="4"/>
                <circle cx="156" cy="104" r="4" fill="#fff" opacity="0.95"/>

                <circle cx="200" cy="70" r="20" fill="#ffd86b" stroke="#8b5a17" stroke-width="4"/>
                <circle cx="208" cy="62" r="5" fill="#fff" opacity="0.95"/>

                <circle cx="250" cy="110" r="16" fill="#ffd86b" stroke="#8b5a17" stroke-width="4"/>
                <circle cx="256" cy="104" r="4" fill="#fff" opacity="0.95"/>

                <!-- small side knobs -->
                <circle cx="110" cy="132" r="10" fill="#ffd86b" stroke="#8b5a17" stroke-width="3"/>
                <circle cx="290" cy="132" r="10" fill="#ffd86b" stroke="#8b5a17" stroke-width="3"/>
              </g>

              <!-- subtle inner shines -->
              <g fill="rgba(255,255,255,0.12)" transform="translate(0,-6)">
                <ellipse cx="150" cy="152" rx="34" ry="9" transform="rotate(-12 150 152)"/>
                <ellipse cx="200" cy="128" rx="46" ry="12" transform="rotate(-6 200 128)"/>
                <ellipse cx="250" cy="152" rx="34" ry="9" transform="rotate(12 250 152)"/>
              </g>

              <!-- center text -->
              <text x="200" y="248" font-family="Georgia, serif" font-size="48" font-weight="bold" fill="#1e1b4b" text-anchor="middle" letter-spacing="2">
                R.D.P
              </text>
            </svg>

        </div>
    </header>
</body>
</html>
