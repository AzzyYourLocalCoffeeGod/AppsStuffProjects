<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aeon Academy - Application Form</title>
  <link rel="stylesheet" href="aeon-applications.css">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">
    <h1>Aeon Academy / Aurora Fold Team Application</h1>
    <p class="subtitle">We're building the future of learning and creation. Tell us how you'd like to help.</p>

    <form>
      <label for="name">Full Name</label>
      <input type="text" id="name" name="name" placeholder="E.g., Azrael Hamade" required>

      <label for="email">Email Address</label>
      <input type="email" id="email" name="email" placeholder="yourname@example.com" required>

      <label for="position">Position / Role You're Interested In</label>
      <select id="position" name="position" required>
        <option value="">Select a role</option>
        <option value="developer">Developer / Engineer</option>
        <option value="designer">UI/UX Designer</option>
        <option value="educator">Educator / Curriculum Creator</option>
        <option value="researcher">Researcher / AI Specialist</option>
        <option value="other">Other (tell us below)</option>
      </select>

      <fieldset class="radio-group">
        <legend>Availability</legend>
        <div class="radio-option">
          <input type="radio" id="fulltime" name="availability" value="full-time" required>
          <label for="fulltime">Full-Time</label>
        </div>
        <div class="radio-option">
          <input type="radio" id="parttime" name="availability" value="part-time">
          <label for="parttime">Part-Time / Contract</label>
        </div>
        <div class="radio-option">
          <input type="radio" id="freelance" name="availability" value="freelance">
          <label for="freelance">Freelance / Project-Based</label>
        </div>
      </fieldset>

      <label for="message">Why do you want to join Aeon Academy / Aurora Fold? (tell us your vision)</label>
      <textarea id="message" name="message" rows="6" placeholder="I dream of..."></textarea>

      <button type="submit">Submit Application</button>
    </form>
  </div>
</body>
</html>
