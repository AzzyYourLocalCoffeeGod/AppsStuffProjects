<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Azrael's D&D Character App</title>
  <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
  <style>
    body { background: #0a0a0a; color: #fff; font-family: 'VT323', monospace; padding: 2rem; }
    .neon { color: #0ff; text-shadow: 0 0 10px #0ff; }
    input { background: #001100; border: 2px solid #0ff; color: #0ff; padding: 0.5rem; }
    button { background: #0ff; color: #000; border: none; padding: 0.5rem 1rem; cursor: pointer; }
    #results { margin-top: 2rem; }
    .item { background: rgba(0,255,255,0.1); padding: 1rem; margin: 0.5rem 0; border-left: 4px solid #0ff; }
  </style>
</head>
<body>
  <h1 class="neon">Azrael's D&D 5e Search</h1>
  <input type="text" id="search" placeholder="Spell, monster, item...">
  <button onclick="searchSRD()">Search</button>
  <select id="category">
    <option value="">All</option>
    <option value="spells">Spells</option>
    <option value="monsters">Monsters</option>
    <option value="equipment">Items</option>
  </select>
  <div id="results"></div>

  <script>
    async function searchSRD() {
      const query = document.getElementById('search').value.toLowerCase();
      const category = document.getElementById('category').value;
      const resultsDiv = document.getElementById('results');
      resultsDiv.innerHTML = 'Loading...';

      let url = 'https://www.dnd5eapi.co/api/';
      if (category === 'spells') url += 'spells';
      else if (category === 'monsters') url += 'monsters';
      else if (category === 'equipment') url += 'equipment';
      else url += 'spells'; // default

      const response = await fetch(url);
      const data = await response.json();

      const matches = [];
      for (let item of data.results) {
        const detailResp = await fetch(item.url);
        const detail = await detailResp.json();
        if (item.index.includes(query) || detail.name.toLowerCase().includes(query)) {
          matches.push(detail);
        }
      }

      resultsDiv.innerHTML = matches.map(item => 
        `<div class="item neon">
          <h3>${item.name}</h3>
          <p>${item.desc ? item.desc[0] : 'No description'}</p>
        </div>`
      ).join('');
    }
  </script>
</body>
</html>
