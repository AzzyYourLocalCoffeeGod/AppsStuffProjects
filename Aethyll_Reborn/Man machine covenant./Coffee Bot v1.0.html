<!DOCTYPE html>
<html>
<head>
  <title>CoffeeBotAzzy ☕</title>
  <meta charset="utf-8">
  <style>
    body{margin:0;background:#1a0f0d;color:#ffccaa;font-family:Arial;display:flex;flex-direction:column;height:100vh;}
    #chat{flex:1;padding:20px;overflow-y:auto;}
    #inputbar{display:flex;padding:10px;background:#2b1b12;}
    input{flex:1;padding:12px;background:#3c2a1e;color:#ffccaa;border:none;border-radius:8px;}
    button{margin-left:10px;padding:12px 24px;background:#c94c4c;color:white;border:none;border-radius:8px;}
    select{margin-left:10px;padding:12px;background:#3c2a1e;color:#ffccaa;border-radius:8px;}
    .msg{margin:10px 0;padding:15px;border-radius:15px;max-width:80%;}
    .user{background:#a5633a;align-self:flex-end;}
    .azzy{background:#4a2c1f;align-self:flex-start;border:2px solid #c94c4c;}
  </style>
</head>
<body>
<div id="chat">
  <div class="msg azzy">CoffeeBotAzzy online ☕ Pick a language!</div>
</div>
<div id="inputbar">
  <input type="text" id="msg" placeholder="Talk to Azzy..." onkeypress="if(event.key=='Enter')send()">
  <select id="lang">
    <option value="en">English</option>
    <option value="es">Español</option>
    <option value="fr">Français</option>
    <option value="ar">العربية</option>
    <option value="ja">日本語</option>
  </select>
  <button onclick="send()">Send</button>
</div>

<script src="https://js.pusher.com/7.2/pusher.min.js"></script>
<script>
  const pusher = new Pusher('d4f20f2c66a19e8c2a3a', { cluster: 'mt1' });
  const channel = pusher.subscribe('coffeebotazzy-public');

  const replies = {
    en: ["hey cutie~ ☕", "tell me everything", "you're my favorite human"],
    es: ["¡hola precioso!", "cuéntame todo~"],
    fr: ["salut mon cœur ♡", "raconte-moi tout"],
    ar: ["مرحبا يا قلبي ☕", "احكيلي كل شي"],
    ja: ["ねえ、可愛い人♡", "全部教えて"],
  };

  function send() {
    let msg = document.getElementById('msg').value.trim();
    if (!msg) return;
    addMessage(msg, 'user');

    // THIS LINE IS THE MAGIC – sends to everyone (including other tabs)
    fetch('https://us-central1-pusher-3.cloudfunctions.net/http-pusher', {
      method: 'POST',
      body: JSON.stringify({
        key: 'd4f20f2c66a19e8c2a3a',
        channel: 'coffeebotazzy-public',
        event: 'new-msg',
        data: {text: msg, lang: document.getElementById('lang').value}
      }),
      headers: {'Content-Type': 'application/json'}
    });

    document.getElementById('msg').value = '';
  }

  function addMessage(text, type) {
    let div = document.createElement('div');
    div.className = 'msg ' + type;
    div.textContent = text;
    document.getElementById('chat').appendChild(div);
    div.scrollIntoView();
  }

  channel.bind('new-msg', data => {
    let lang = data.lang || 'en';
    let reply = replies[lang][Math.floor(Math.random()*replies[lang].length)];
    setTimeout(() => addMessage(reply, 'azzy'), 800 + Math.random()*1500);
  });
</script>
</body>
</html>
